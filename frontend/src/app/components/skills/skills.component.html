<section class="section" id="skills">
  <div class="container">
    <p class="section-label">What I work with</p>
    <h2 class="section-title">Skills &amp; <span>Technologies</span></h2>
    <div class="section-divider"></div>

    <div class="skills__grid">
      <div class="skills__group card" *ngFor="let group of skillGroups">
        <h3 class="skills__category">{{ group.category }}</h3>
        <div class="skills__tags">
          <span *ngFor="let skill of group.skills">{{ skill }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
