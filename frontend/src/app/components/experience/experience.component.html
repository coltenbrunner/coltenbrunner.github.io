<section class="section" id="experience">
  <div class="container">
    <h2 class="section-title">Experience</h2>

    <div class="exp-group" *ngIf="research.length">
      <h3 class="exp-group__label">Research</h3>
      <div class="exp__item" *ngFor="let job of research">
        <div class="exp__header">
          <span class="exp__role">{{ job.role }}, {{ job.company }}</span>
          <span class="exp__dates">{{ job.start }} – {{ job.end }}</span>
        </div>
        <p class="exp__desc" *ngIf="job.bullets.length">{{ job.bullets.join(' ') }}</p>
      </div>
    </div>

    <div class="exp-group" *ngIf="teaching.length">
      <h3 class="exp-group__label">Teaching</h3>
      <div class="exp__item" *ngFor="let job of teaching">
        <div class="exp__header">
          <span class="exp__role">{{ job.role }}, {{ job.company }}</span>
          <span class="exp__dates">{{ job.start }} – {{ job.end }}</span>
        </div>
        <p class="exp__desc" *ngIf="job.bullets.length">{{ job.bullets.join(' ') }}</p>
      </div>
    </div>

    <div class="exp-group" *ngIf="work.length">
      <h3 class="exp-group__label">Industry</h3>
      <div class="exp__item" *ngFor="let job of work">
        <div class="exp__header">
          <span class="exp__role">{{ job.role }}, {{ job.company }}</span>
          <span class="exp__dates">{{ job.start }} – {{ job.end }}</span>
        </div>
      </div>
    </div>

  </div>
</section>
