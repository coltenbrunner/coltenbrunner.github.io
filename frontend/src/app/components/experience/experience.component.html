<section class="section" id="experience">
  <div class="container">
    <p class="section-label">Where I've worked</p>
    <h2 class="section-title">Work <span>Experience</span></h2>
    <div class="section-divider"></div>

    <div class="timeline">
      <div class="timeline__item card" *ngFor="let job of experience">
        <div class="timeline__header">
          <div>
            <h3 class="timeline__role">{{ job.role }}</h3>
            <p class="timeline__company">
              {{ job.company }}
              <span class="timeline__location">· {{ job.location }}</span>
            </p>
          </div>
          <span class="timeline__dates">{{ job.start }} – {{ job.end }}</span>
        </div>
        <ul class="timeline__bullets">
          <li *ngFor="let bullet of job.bullets">{{ bullet }}</li>
        </ul>
      </div>
    </div>
  </div>
</section>
